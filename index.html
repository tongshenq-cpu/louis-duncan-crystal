<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Louis Duncan Crystal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:#0b0b14;
 color:white;
}
header{
 background:linear-gradient(120deg,#5f2eea,#8b5cf6);
 padding:50px 20px;
 text-align:center;
}
header h1{
 font-size:40px;
 margin:0;
}
header p{opacity:.9}

.search-bar{
 margin-top:20px;
}
.search-bar input{
 padding:12px 18px;
 width:280px;
 border-radius:30px;
 border:none;
 outline:none;
}

.container{
 width:1200px;
 max-width:95%;
 margin:auto;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:24px;
 padding:40px 0;
}

.card{
 background:#151528;
 border-radius:14px;
 overflow:hidden;
 transition:0.3s;
 box-shadow:0 8px 20px rgba(0,0,0,.4);
}

.card:hover{
 transform:translateY(-6px);
 box-shadow:0 15px 30px rgba(0,0,0,.6);
}

.card img{
 width:100%;
 height:180px;
 object-fit:cover;
}

.card-body{
 padding:18px;
}

.card-body h3{
 margin:0 0 6px 0;
 font-size:18px;
}

.price{
 color:#22c55e;
 font-weight:600;
}

.category{
 font-size:13px;
 opacity:.7;
}

.chart-section{
 padding:60px 0;
}

.chart-box{
 background:#151528;
 padding:30px;
 border-radius:14px;
}

footer{
 margin-top:60px;
 padding:30px;
 text-align:center;
 background:#0d0d18;
 opacity:.8;
}
</style>
</head>
<body>

<header>
<h1>Louis Duncan Crystal</h1>
<p>Malaysia Crystal Market Price & Collection</p>

<div class="search-bar">
<input id="search" placeholder="Search crystal..." />
</div>
</header>

<div class="container">

<div class="grid" id="grid"></div>

<section class="chart-section">
<div class="chart-box">
<h2>Malaysia Crystal Price Trend</h2>
<canvas id="chart"></canvas>
</div>
</section>

</div>

<footer>
<p>© 2026 Louis Duncan Crystal</p>
</footer>

<script>
let crystals=[]

fetch('data/crystals.json')
.then(r=>r.json())
.then(data=>{
crystals=data.crystals
render(crystals)
initChart()
})

function render(list){
const grid=document.getElementById('grid')

grid.innerHTML=""

list.forEach(c=>{
const card=`
<div class="card">
<img src="${c.image}">
<div class="card-body">
<h3>${c.name}</h3>
<div class="category">${c.category}</div>
<div class="price">${c.price}</div>
</div>
</div>`

grid.innerHTML+=card
})
}

const search=document.getElementById("search")
search.addEventListener("input",()=>{
let v=search.value.toLowerCase()
let filtered=crystals.filter(c=>c.name.toLowerCase().includes(v))
render(filtered)
})

function initChart(){
new Chart(document.getElementById('chart'),{
 type:'line',
 data:{
 labels:['Jan','Feb','Mar','Apr','May','Jun'],
 datasets:[{
 label:'Average Crystal Price (RM)',
 data:[40,55,52,68,63,75],
 borderColor:'#8b5cf6',
 backgroundColor:'rgba(139,92,246,.2)',
 tension:.4
 }]
 }
})
}
</script>

</body>
</html>
